<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>優雅奶茶棕複利計算機</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #F5F2EE;
            color: #5D534A;
        }

        /* 自定義滑桿樣式 */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: #EBE3DB;
            border-radius: 3px;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #B8977E;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-7xl mx-auto">
        <!-- 標題區域 -->
        <header class="mb-10 flex flex-col items-center md:items-start">
            <div class="flex items-center gap-3 mb-2">
                <div class="bg-[#B8977E] p-2.5 rounded-2xl shadow-md text-white">
                    <i data-lucide="calculator"></i>
                </div>
                <h1 class="text-3xl font-bold tracking-tight text-[#5D534A]">複利投資計算機</h1>
            </div>
            <p class="text-[#A69B91] text-lg font-medium">規劃您的投資，靜待財富優雅成長。</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- 左側：參數面板 -->
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-8 rounded-[2rem] shadow-[0_10px_30px_rgba(184,151,126,0.1)] border border-[#EBE3DB]">
                    <h2 class="text-lg font-bold mb-8 flex items-center gap-2">
                        <i data-lucide="sparkles" class="text-[#B8977E] w-5 h-5"></i>
                        投資參數
                    </h2>
                    
                    <div class="space-y-6">
                        <!-- 初始本金 -->
                        <div>
                            <label class="block text-xs font-bold text-[#A69B91] uppercase tracking-widest mb-3">初始本金 (TWD)</label>
                            <div class="relative">
                                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-[#B8977E] font-medium">$</span>
                                <input type="number" id="initialAmount" value="1000000" class="w-full pl-9 pr-4 py-3 bg-[#F9F7F5] border border-[#EBE3DB] rounded-2xl focus:ring-4 focus:ring-[#B8977E]/10 focus:border-[#B8977E] outline-none transition-all font-medium">
                            </div>
                        </div>

                        <!-- 定期定額 -->
                        <div>
                            <label class="block text-xs font-bold text-[#A69B91] uppercase tracking-widest mb-3">每月定期定額</label>
                            <div class="relative">
                                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-[#B8977E] font-medium">$</span>
                                <input type="number" id="monthlyContribution" value="10000" class="w-full pl-9 pr-4 py-3 bg-[#F9F7F5] border border-[#EBE3DB] rounded-2xl focus:ring-4 focus:ring-[#B8977E]/10 focus:border-[#B8977E] outline-none transition-all font-medium">
                            </div>
                        </div>

                        <!-- 報酬率 -->
                        <div>
                            <label class="block text-xs font-bold text-[#A69B91] uppercase tracking-widest mb-3">預估年化報酬率 (%)</label>
                            <div class="relative">
                                <input type="number" id="annualRate" value="8" step="0.1" class="w-full px-4 py-3 bg-[#F9F7F5] border border-[#EBE3DB] rounded-2xl focus:ring-4 focus:ring-[#B8977E]/10 focus:border-[#B8977E] outline-none transition-all font-medium">
                                <span class="absolute right-4 top-1/2 -translate-y-1/2 text-[#B8977E] font-medium">%</span>
                            </div>
                        </div>

                        <!-- 投資年限 -->
                        <div>
                            <div class="flex justify-between items-center mb-5">
                                <label class="text-xs font-bold text-[#A69B91] uppercase tracking-widest">投資年限</label>
                                <span id="yearsDisplay" class="bg-[#B8977E] text-white px-3 py-1 rounded-lg text-xs font-bold">5 年</span>
                            </div>
                            <input type="range" id="years" min="1" max="40" value="5" class="w-full">
                            <div class="flex justify-between text-[10px] font-bold text-[#A69B91] mt-3">
                                <span>1 YEAR</span>
                                <span>40 YEARS</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右側：結果與圖表 -->
            <div class="lg:col-span-8 space-y-6">
                <!-- 摘要卡片 -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-[#B8977E] p-7 rounded-[2rem] shadow-xl shadow-[#B8977E]/20 text-white">
                        <div class="flex items-center gap-2 opacity-80 mb-3 text-xs font-black tracking-widest uppercase">
                            <i data-lucide="wallet" class="w-4 h-4"></i> 預估總資產
                        </div>
                        <p id="totalAmountResult" class="text-2xl font-bold">NT$ 0</p>
                    </div>
                    <div class="bg-white p-7 rounded-[2rem] shadow-sm border border-[#EBE3DB]">
                        <div class="flex items-center gap-2 text-[#A69B91] mb-3 text-xs font-black tracking-widest uppercase">
                            <div class="w-2 h-2 rounded-full bg-[#DBC9BC]"></div> 總投入本金
                        </div>
                        <p id="totalContributionResult" class="text-2xl font-bold">NT$ 0</p>
                    </div>
                    <div class="bg-white p-7 rounded-[2rem] shadow-sm border border-[#EBE3DB]">
                        <div class="flex items-center gap-2 text-[#A69B91] mb-3 text-xs font-black tracking-widest uppercase">
                            <div class="w-2 h-2 rounded-full bg-[#B8977E]"></div> 累積總收益
                        </div>
                        <p id="totalProfitResult" class="text-2xl font-bold">NT$ 0</p>
                    </div>
                </div>

                <!-- 圖表區 -->
                <div class="bg-white p-8 md:p-10 rounded-[2.5rem] shadow-sm border border-[#EBE3DB]">
                    <div class="grid grid-cols-1 xl:grid-cols-12 gap-12">
                        <!-- 趨勢圖 -->
                        <div class="xl:col-span-7">
                            <h3 class="text-lg font-bold mb-6 flex items-center gap-2">
                                <i data-lucide="trending-up" class="text-[#B8977E] w-5 h-5"></i> 資產成長軌跡
                            </h3>
                            <div class="h-[320px]">
                                <canvas id="lineChart"></canvas>
                            </div>
                        </div>
                        <!-- 圓餅圖 -->
                        <div class="xl:col-span-5 bg-[#F9F7F5] rounded-3xl p-8 flex flex-col items-center border border-[#F0EAE4]">
                            <h3 class="text-sm font-bold mb-4">收益佔比分析</h3>
                            <div class="h-[200px] w-full relative">
                                <canvas id="pieChart"></canvas>
                                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-center">
                                    <p class="text-[10px] font-black text-[#A69B91] uppercase tracking-widest">收益率</p>
                                    <p id="profitRateDisplay" class="text-2xl font-bold text-[#8C7355]">0%</p>
                                </div>
                            </div>
                            <div class="w-full mt-6 space-y-2 text-xs font-bold">
                                <div class="flex justify-between items-center">
                                    <span class="text-[#A69B91]">● 本金投入</span>
                                    <span id="pieContributionLabel">0</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="text-[#B8977E]">● 累積收益</span>
                                    <span id="pieProfitLabel">0</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 底部提示 -->
                <div class="bg-white border border-[#EBE3DB] p-7 rounded-[2rem] flex items-start gap-4">
                    <div class="bg-[#F9F7F5] p-2 rounded-xl text-[#B8977E]">
                        <i data-lucide="pie-chart"></i>
                    </div>
                    <div class="space-y-1">
                        <h4 class="font-bold text-sm">複利美學分析</h4>
                        <p id="footerAnalysis" class="text-[#A69B91] text-xs leading-relaxed">
                            在未來的投資歲月中，時間將成為您最優雅的夥伴。
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 初始化 Lucide 圖標
        lucide.createIcons();

        // 取得 DOM 元素
        const inputs = ['initialAmount', 'monthlyContribution', 'annualRate', 'years'];
        const elements = {};
        inputs.forEach(id => elements[id] = document.getElementById(id));
        const yearsDisplay = document.getElementById('yearsDisplay');
        
        const totalAmountResult = document.getElementById('totalAmountResult');
        const totalContributionResult = document.getElementById('totalContributionResult');
        const totalProfitResult = document.getElementById('totalProfitResult');
        const profitRateDisplay = document.getElementById('profitRateDisplay');
        const footerAnalysis = document.getElementById('footerAnalysis');

        // 圖表實例
        let lineChart, pieChart;

        function formatCurrency(val) {
            return new Intl.NumberFormat('zh-TW').format(Math.round(val));
        }

        function updateCalculations() {
            const initial = parseFloat(elements.initialAmount.value) || 0;
            const monthly = parseFloat(elements.monthlyContribution.value) || 0;
            const rate = (parseFloat(elements.annualRate.value) || 0) / 100 / 12;
            const years = parseInt(elements.years.value);

            yearsDisplay.innerText = `${years} 年`;

            let currentBalance = initial;
            let totalContribution = initial;
            const labels = ['第 0 年'];
            const dataTotal = [initial];
            const dataContribution = [initial];

            for (let i = 1; i <= years; i++) {
                for (let m = 1; m <= 12; m++) {
                    currentBalance = (currentBalance + monthly) * (1 + rate);
                    totalContribution += monthly;
                }
                labels.push(`第 ${i} 年`);
                dataTotal.push(Math.round(currentBalance));
                dataContribution.push(Math.round(totalContribution));
            }

            const finalAmount = dataTotal[dataTotal.length - 1];
            const finalContribution = dataContribution[dataContribution.length - 1];
            const finalProfit = finalAmount - finalContribution;
            const profitRate = finalAmount > 0 ? (finalProfit / finalAmount * 100).toFixed(1) : 0;

            // 更新數字顯示
            totalAmountResult.innerText = `NT$ ${formatCurrency(finalAmount)}`;
            totalContributionResult.innerText = `NT$ ${formatCurrency(finalContribution)}`;
            totalProfitResult.innerText = `NT$ ${formatCurrency(finalProfit)}`;
            profitRateDisplay.innerText = `${Math.round(profitRate)}%`;
            
            document.getElementById('pieContributionLabel').innerText = formatCurrency(finalContribution);
            document.getElementById('pieProfitLabel').innerText = formatCurrency(finalProfit);

            footerAnalysis.innerHTML = `在未來的 <span class="text-[#8C7355] font-bold">${years}</span> 年中，時間將成為您最優雅的夥伴。資產預期成長至 <span class="text-[#8C7355] font-bold">${formatCurrency(finalAmount)}</span> 元，收益佔比達 <span class="text-[#8C7355] font-bold">${profitRate}%</span>。`;

            updateCharts(labels, dataTotal, dataContribution, finalContribution, finalProfit);
        }

        function updateCharts(labels, dataTotal, dataContribution, finalContribution, finalProfit) {
            // 線圖
            if (lineChart) lineChart.destroy();
            const ctxLine = document.getElementById('lineChart').getContext('2d');
            lineChart = new Chart(ctxLine, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '總金額',
                            data: dataTotal,
                            borderColor: '#B8977E',
                            borderWidth: 4,
                            backgroundColor: 'rgba(184, 151, 126, 0.1)',
                            fill: true,
                            tension: 0.4,
                            pointRadius: 0
                        },
                        {
                            label: '本金投入',
                            data: dataContribution,
                            borderColor: '#DBC9BC',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            fill: false,
                            tension: 0,
                            pointRadius: 0
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            grid: { color: '#F0EAE4', drawBorder: false },
                            ticks: { color: '#A69B91', font: { size: 10 } }
                        },
                        x: { 
                            grid: { display: false },
                            ticks: { color: '#A69B91', font: { size: 10 } }
                        }
                    }
                }
            });

            // 圓餅圖
            if (pieChart) pieChart.destroy();
            const ctxPie = document.getElementById('pieChart').getContext('2d');
            pieChart = new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: ['本金投入', '累積收益'],
                    datasets: [{
                        data: [finalContribution, finalProfit],
                        backgroundColor: ['#DBC9BC', '#B8977E'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '75%',
                    plugins: { legend: { display: false } }
                }
            });
        }

        // 監聽所有輸入
        inputs.forEach(id => {
            elements[id].addEventListener('input', updateCalculations);
        });

        // 初始執行一次
        window.onload = updateCalculations;
    </script>
</body>
</html>
